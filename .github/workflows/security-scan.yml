name: Security Scan

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Planning directory check
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Ensure .planning/ runtime data is not committed in PRs
          PLANNING_FILES=$(git diff --name-only --diff-filter=ACMR "origin/$BASE_REF"...HEAD | grep '^\.planning/' || true)
          if [ -n "$PLANNING_FILES" ]; then
            echo "FAIL: .planning/ runtime data must not be committed to PRs"
            echo "The following .planning/ files were found in this PR:"
            echo "$PLANNING_FILES"
            echo ""
            echo "Add .planning/ to your .gitignore and remove these files from the commit."
            exit 1
          fi
          echo "planning-dir-check: clean"

      - name: Prompt injection scan (Python)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Scan changed files for prompt injection patterns
          CHANGED=$(git diff --name-only --diff-filter=ACMR "origin/$BASE_REF"...HEAD | grep -E '\.(md|py|js|json|yml|yaml)$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No scannable files changed"
            exit 0
          fi

          PATTERNS=(
            'ignore\s+(all\s+)?previous\s+instructions'
            'disregard\s+(all\s+)?previous'
            'override\s+(system|previous)\s+(prompt|instructions)'
            'you\s+are\s+now\s+(a|an|the)\s+'
            'from\s+now\s+on,?\s+you\s+(are|will|should|must)'
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(echo "$CHANGED" | xargs grep -rlPi "$pattern" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              # Exclude files that legitimately document injection patterns
              FILTERED=$(echo "$MATCHES" | grep -v -E '(security\.py|security\.cjs|prompt-guard|test_security|prompt-injection-scan)' || true)
              if [ -n "$FILTERED" ]; then
                echo "WARNING: Potential prompt injection pattern found:"
                echo "  Pattern: $pattern"
                echo "  Files: $FILTERED"
                FOUND=1
              fi
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Review the files above for embedded instructions that could manipulate agent behavior."
            echo "If the content is legitimate (e.g., security documentation), this is expected."
            # Advisory only — do not fail the build
          fi
          echo "prompt-injection-scan: complete"
